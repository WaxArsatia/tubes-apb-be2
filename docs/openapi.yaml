components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    CategoryTypeQuery:
      name: type
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/CategoryType'
    SavingTypeQuery:
      name: type
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/SavingType'
    MonthQuery:
      name: month
      in: query
      required: false
      description: Filter month in YYYY-MM format.
      schema:
        type: string
        pattern: '^\d{4}-\d{2}$'
        example: '2026-04'
    CategoryIdQuery:
      name: categoryId
      in: query
      required: false
      schema:
        type: string
        format: uuid
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: VALIDATION_ERROR
              message: Validation failed
              details:
                - field: amount
                  message: Amount must be positive
    UnauthenticatedError:
      description: Missing, invalid, or expired credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UNAUTHENTICATED
              message: Authentication required
              details: []
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: NOT_FOUND
              message: Resource not found
              details: []
    ConflictError:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: CONFLICT
              message: Resource already exists
              details: []
    UnprocessableError:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UNPROCESSABLE_ENTITY
              message: Business rule failed
              details: []
  schemas:
    Uuid:
      type: string
      format: uuid
    DateOnly:
      type: string
      format: date
      example: '2026-04-30'
    DateTime:
      type: string
      format: date-time
      example: '2026-04-30T10:00:00Z'
    Money:
      type: integer
      minimum: 1
      description: Integer IDR amount.
      example: 25000
    CategoryType:
      type: string
      enum: [expense, saving]
    SavingType:
      type: string
      enum: [general_income, saving]
    ActivityKind:
      type: string
      enum: [transaction, saving]
    PaginationMeta:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1
        totalPages:
          type: integer
          example: 1
    Warning:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: BUDGET_EXCEEDED
        message:
          type: string
          example: Transaction exceeds the category monthly budget
        details:
          type: object
          additionalProperties: true
    ErrorDetail:
      type: object
      properties:
        field:
          type: string
          nullable: true
          example: amount
        message:
          type: string
          example: Amount must be positive
    ErrorObject:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Validation failed
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
          default: []
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorObject'
    MessageData:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    MessageResponse:
      type: object
      required: [data, message]
      properties:
        data:
          $ref: '#/components/schemas/MessageData'
        message:
          type: string
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
          example: Alya
        email:
          type: string
          format: email
          example: alya@example.com
        password:
          type: string
          minLength: 8
          format: password
          example: password123
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          format: password
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetPasswordRequest:
      type: object
      required: [email, code, newPassword]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^[A-Za-z0-9]{6}$'
          example: A1B2C3
        newPassword:
          type: string
          minLength: 8
          format: password
    User:
      type: object
      required: [id, name, email, profilePhotoUrl, budgetNotificationEnabled, createdAt, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
        email:
          type: string
          format: email
        profilePhotoUrl:
          type: string
          nullable: true
          example: /uploads/profile-photos/4e571d70.png
        budgetNotificationEnabled:
          type: boolean
        createdAt:
          $ref: '#/components/schemas/DateTime'
        updatedAt:
          $ref: '#/components/schemas/DateTime'
    AuthTokens:
      type: object
      required: [accessToken, refreshToken, tokenType, expiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          enum: [Bearer]
        expiresIn:
          type: integer
          description: Access token lifetime in seconds.
          example: 86400
    AuthData:
      allOf:
        - $ref: '#/components/schemas/AuthTokens'
        - type: object
          required: [user]
          properties:
            user:
              $ref: '#/components/schemas/User'
    AuthResponse:
      type: object
      required: [data, message]
      properties:
        data:
          $ref: '#/components/schemas/AuthData'
        message:
          type: string
    TokenResponse:
      type: object
      required: [data, message]
      properties:
        data:
          $ref: '#/components/schemas/AuthTokens'
        message:
          type: string
    ProfileResponse:
      type: object
      required: [data, message]
      properties:
        data:
          $ref: '#/components/schemas/User'
        message:
          type: string
    UpdateProfileRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
    UpdateNotificationSettingsRequest:
      type: object
      required: [budgetNotificationEnabled]
      properties:
        budgetNotificationEnabled:
          type: boolean
    Category:
      type: object
      required: [id, type, name, iconKey, monthlyBudget, savingTarget, createdAt, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        type:
          $ref: '#/components/schemas/CategoryType'
        name:
          type: string
        iconKey:
          type: string
          example: food
        monthlyBudget:
          type: integer
          nullable: true
