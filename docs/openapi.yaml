openapi: 3.0.4
info:
  title: FinU API
  version: 1.0.0
  description: API contract for the FinU Flutter mobile client and Hono backend.
  license:
    name: Proprietary
servers:
  - url: /
    description: Current API host
tags:
  - name: Auth
    description: Authentication, token rotation, logout, and password reset.
  - name: Profile
    description: Current user profile and profile photo upload.
  - name: Settings
    description: User application settings.
  - name: Categories
    description: Expense and saving categories.
  - name: Transactions
    description: Expense transaction records.
  - name: Savings
    description: General income and saving entries.
  - name: Activities
    description: Recent mixed activity feed for the dashboard.
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      tags: [Auth]
      security: []
      operationId: registerUser
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: Alya
              email: alya@example.com
              password: password123
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                data:
                  user:
                    id: 4e571d70-7c45-4478-a681-640c3713b7b1
                    name: Alya
                    email: alya@example.com
                    profilePhotoUrl: null
                    budgetNotificationEnabled: true
                    createdAt: '2026-04-30T10:00:00Z'
                    updatedAt: '2026-04-30T10:00:00Z'
                  accessToken: access.jwt.token
                  refreshToken: refresh.jwt.token
                  tokenType: Bearer
                  expiresIn: 86400
                message: Registered successfully
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /auth/login:
    post:
      tags: [Auth]
      security: []
      operationId: loginUser
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: alya@example.com
              password: password123
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                data:
                  user:
                    id: 4e571d70-7c45-4478-a681-640c3713b7b1
                    name: Alya
                    email: alya@example.com
                    profilePhotoUrl: null
                    budgetNotificationEnabled: true
                    createdAt: '2026-04-30T10:00:00Z'
                    updatedAt: '2026-04-30T10:00:00Z'
                  accessToken: access.jwt.token
                  refreshToken: refresh.jwt.token
                  tokenType: Bearer
                  expiresIn: 86400
                message: Logged in successfully
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
  /auth/refresh:
    post:
      tags: [Auth]
      security: []
      operationId: refreshToken
      summary: Rotate refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            example:
              refreshToken: refresh.jwt.token
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              example:
                data:
                  accessToken: new.access.jwt.token
                  refreshToken: new.refresh.jwt.token
                  tokenType: Bearer
                  expiresIn: 86400
                message: Token refreshed successfully
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logoutUser
      summary: Revoke current refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            example:
              refreshToken: refresh.jwt.token
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                data:
                  success: true
                message: Logged out successfully
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
  /auth/forgot-password:
    post:
      tags: [Auth]
      security: []
      operationId: forgotPassword
      summary: Send password reset code by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
            example:
              email: alya@example.com
      responses:
        '200':
          description: Reset code sent if email exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                data:
                  success: true
                message: Reset code sent to email
        '400':
          $ref: '#/components/responses/ValidationError'
  /auth/reset-password:
    post:
      tags: [Auth]
      security: []
      operationId: resetPassword
      summary: Reset password with 6-character alphanumeric code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
            example:
              email: alya@example.com
              code: A1B2C3
              newPassword: newpassword123
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                data:
                  success: true
                message: Password reset successfully
        '400':
          $ref: '#/components/responses/ValidationError'
        '422':
          $ref: '#/components/responses/UnprocessableError'
  /profile:
    get:
      tags: [Profile]
      operationId: getProfile
      summary: Get current profile
      responses:
        '200':
          description: Current profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
              example:
                data:
                  id: 4e571d70-7c45-4478-a681-640c3713b7b1
                  name: Alya
                  email: alya@example.com
                  profilePhotoUrl: /uploads/profile-photos/4e571d70.png
                  budgetNotificationEnabled: true
                  createdAt: '2026-04-30T10:00:00Z'
                  updatedAt: '2026-04-30T10:00:00Z'
                message: Profile retrieved successfully
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
    patch:
      tags: [Profile]
      operationId: updateProfile
      summary: Update profile name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            example:
              name: Alya Putri
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
              example:
                data:
                  id: 4e571d70-7c45-4478-a681-640c3713b7b1
                  name: Alya Putri
                  email: alya@example.com
                  profilePhotoUrl: /uploads/profile-photos/4e571d70.png
                  budgetNotificationEnabled: true
                  createdAt: '2026-04-30T10:00:00Z'
                  updatedAt: '2026-04-30T11:00:00Z'
                message: Profile updated successfully
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
  /profile/photo:
    post:
      tags: [Profile]
      operationId: uploadProfilePhoto
      summary: Upload profile photo
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        '200':
          description: Profile photo uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
              example:
                data:
                  id: 4e571d70-7c45-4478-a681-640c3713b7b1
                  name: Alya
                  email: alya@example.com
                  profilePhotoUrl: /uploads/profile-photos/4e571d70.png
                  budgetNotificationEnabled: true
                  createdAt: '2026-04-30T10:00:00Z'
                  updatedAt: '2026-04-30T11:00:00Z'
                message: Profile photo uploaded successfully
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
  /settings/notifications:
    patch:
      tags: [Settings]
      operationId: updateNotificationSettings
      summary: Update budget notification preference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNotificationSettingsRequest'
            example:
              budgetNotificationEnabled: false
      responses:
        '200':
          description: Notification settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
              example:
                data:
                  id: 4e571d70-7c45-4478-a681-640c3713b7b1
                  name: Alya
                  email: alya@example.com
                  profilePhotoUrl: null
                  budgetNotificationEnabled: false
                  createdAt: '2026-04-30T10:00:00Z'
                  updatedAt: '2026-04-30T11:00:00Z'
                message: Notification settings updated successfully
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
  /categories:
    get:
      tags: [Categories]
      operationId: listCategories
      summary: List categories
      parameters:
        - $ref: '#/components/parameters/CategoryTypeQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
              example:
                data:
                  - id: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                    type: expense
                    name: Food
                    iconKey: food
                    monthlyBudget: 1000000
                    savingTarget: null
                    createdAt: '2026-04-30T10:00:00Z'
                    updatedAt: '2026-04-30T10:00:00Z'
                message: Categories retrieved successfully
                meta:
                  page: 1
                  limit: 20
                  total: 1
                  totalPages: 1
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
    post:
      tags: [Categories]
      operationId: createCategory
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
            example:
              type: expense
              name: Food
              iconKey: food
              monthlyBudget: 1000000
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
              example:
                data:
                  id: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                  type: expense
                  name: Food
                  iconKey: food
                  monthlyBudget: 1000000
                  savingTarget: null
                  createdAt: '2026-04-30T10:00:00Z'
                  updatedAt: '2026-04-30T10:00:00Z'
                message: Category created successfully
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/UnprocessableError'
  /categories/{id}:
    get:
      tags: [Categories]
      operationId: getCategory
      summary: Get category
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Category detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
              example:
                data:
                  id: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                  type: expense
                  name: Food
                  iconKey: food
                  monthlyBudget: 1000000
                  savingTarget: null
                  createdAt: '2026-04-30T10:00:00Z'
                  updatedAt: '2026-04-30T10:00:00Z'
                message: Category retrieved successfully
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Categories]
      operationId: updateCategory
      summary: Update category
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
            example:
              name: Food and Drinks
              iconKey: food
              monthlyBudget: 1200000
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
              example:
                data:
                  id: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                  type: expense
                  name: Food and Drinks
                  iconKey: food
                  monthlyBudget: 1200000
                  savingTarget: null
                  createdAt: '2026-04-30T10:00:00Z'
                  updatedAt: '2026-04-30T11:00:00Z'
                message: Category updated successfully
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/UnprocessableError'
    delete:
      tags: [Categories]
      operationId: deleteCategory
      summary: Soft-delete category and unlink related records
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Category deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
              example:
                data:
                  id: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                  deleted: true
                  restoreAvailableUntil: '2026-04-30T11:00:00Z'
                message: Category deleted successfully
        '404':
          $ref: '#/components/responses/NotFoundError'
  /categories/{id}/restore:
    post:
      tags: [Categories]
      operationId: restoreCategory
      summary: Restore soft-deleted category and relink affected records
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Category restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
              example:
                data:
                  id: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                  type: expense
                  name: Food
                  iconKey: food
                  monthlyBudget: 1000000
                  savingTarget: null
                  createdAt: '2026-04-30T10:00:00Z'
                  updatedAt: '2026-04-30T10:30:00Z'
                message: Category restored successfully
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/UnprocessableError'
  /transactions:
    get:
      tags: [Transactions]
      operationId: listTransactions
      summary: List expense transactions
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/MonthQuery'
        - $ref: '#/components/parameters/CategoryIdQuery'
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListResponse'
              example:
                data:
                  - id: 63f171a2-bc7e-4e2a-863a-427d9da75d90
                    name: Lunch
                    amount: 35000
                    categoryId: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                    category:
                      id: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                      type: expense
                      name: Food
                      iconKey: food
                      monthlyBudget: 1000000
                      savingTarget: null
                      createdAt: '2026-04-30T10:00:00Z'
                      updatedAt: '2026-04-30T10:00:00Z'
                    date: '2026-04-30'
                    note: Campus lunch
                    createdAt: '2026-04-30T10:00:00Z'
                    updatedAt: '2026-04-30T10:00:00Z'
                message: Transactions retrieved successfully
                meta:
                  page: 1
                  limit: 20
                  total: 1
                  totalPages: 1
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
    post:
      tags: [Transactions]
      operationId: createTransaction
      summary: Create expense transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
            example:
              name: Lunch
              amount: 35000
              categoryId: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
              date: '2026-04-30'
              note: Campus lunch
      responses:
        '201':
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              example:
                data:
                  id: 63f171a2-bc7e-4e2a-863a-427d9da75d90
                  name: Lunch
                  amount: 35000
                  categoryId: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                  category:
                    id: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                    type: expense
                    name: Food
                    iconKey: food
                    monthlyBudget: 1000000
                    savingTarget: null
                    createdAt: '2026-04-30T10:00:00Z'
                    updatedAt: '2026-04-30T10:00:00Z'
                  date: '2026-04-30'
                  note: Campus lunch
                  createdAt: '2026-04-30T10:00:00Z'
                  updatedAt: '2026-04-30T10:00:00Z'
                message: Transaction created successfully
                warnings:
                  - code: BUDGET_EXCEEDED
                    message: Transaction exceeds the category monthly budget
                    details:
                      categoryId: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                      monthlyBudget: 1000000
                      currentMonthSpending: 980000
                      newTransactionAmount: 35000
        '400':
          $ref: '#/components/responses/ValidationError'
        '422':
          $ref: '#/components/responses/UnprocessableError'
  /transactions/{id}:
    get:
      tags: [Transactions]
      operationId: getTransaction
      summary: Get expense transaction
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Transaction detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              example:
                data:
                  id: 63f171a2-bc7e-4e2a-863a-427d9da75d90
                  name: Lunch
                  amount: 35000
                  categoryId: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                  category:
                    id: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                    type: expense
                    name: Food
                    iconKey: food
                    monthlyBudget: 1000000
                    savingTarget: null
                    createdAt: '2026-04-30T10:00:00Z'
                    updatedAt: '2026-04-30T10:00:00Z'
                  date: '2026-04-30'
                  note: Campus lunch
                  createdAt: '2026-04-30T10:00:00Z'
                  updatedAt: '2026-04-30T10:00:00Z'
                message: Transaction retrieved successfully
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Transactions]
      operationId: updateTransaction
      summary: Update expense transaction
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTransactionRequest'
            example:
              name: Dinner
              amount: 45000
              categoryId: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
              date: '2026-04-30'
              note: Updated note
      responses:
        '200':
          description: Transaction updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              example:
                data:
                  id: 63f171a2-bc7e-4e2a-863a-427d9da75d90
                  name: Dinner
                  amount: 45000
                  categoryId: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                  category:
                    id: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                    type: expense
                    name: Food
                    iconKey: food
                    monthlyBudget: 1000000
                    savingTarget: null
                    createdAt: '2026-04-30T10:00:00Z'
                    updatedAt: '2026-04-30T10:00:00Z'
                  date: '2026-04-30'
                  note: Updated note
                  createdAt: '2026-04-30T10:00:00Z'
                  updatedAt: '2026-04-30T11:00:00Z'
                message: Transaction updated successfully
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/UnprocessableError'
    delete:
      tags: [Transactions]
      operationId: deleteTransaction
      summary: Soft-delete expense transaction
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Transaction deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
              example:
                data:
                  id: 63f171a2-bc7e-4e2a-863a-427d9da75d90
                  deleted: true
                  restoreAvailableUntil: '2026-04-30T11:00:00Z'
                message: Transaction deleted successfully
        '404':
          $ref: '#/components/responses/NotFoundError'
  /transactions/{id}/restore:
    post:
      tags: [Transactions]
      operationId: restoreTransaction
      summary: Restore soft-deleted expense transaction
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Transaction restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              example:
                data:
                  id: 63f171a2-bc7e-4e2a-863a-427d9da75d90
                  name: Lunch
                  amount: 35000
                  categoryId: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                  category:
                    id: a6b35a79-a0a1-47c2-b881-5047cc36ea3c
                    type: expense
                    name: Food
                    iconKey: food
                    monthlyBudget: 1000000
                    savingTarget: null
                    createdAt: '2026-04-30T10:00:00Z'
                    updatedAt: '2026-04-30T10:00:00Z'
                  date: '2026-04-30'
                  note: Campus lunch
                  createdAt: '2026-04-30T10:00:00Z'
                  updatedAt: '2026-04-30T10:30:00Z'
                message: Transaction restored successfully
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/UnprocessableError'
  /savings:
    get:
      tags: [Savings]
      operationId: listSavings
      summary: List saving entries
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/SavingTypeQuery'
        - $ref: '#/components/parameters/MonthQuery'
        - $ref: '#/components/parameters/CategoryIdQuery'
      responses:
        '200':
          description: Saving list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingListResponse'
              example:
                data:
                  - id: b5479e1a-9818-45fa-860e-8d81789f1140
                    type: saving
                    name: Emergency fund
                    amount: 200000
                    categoryId: 44e3d431-e058-412e-a8cc-7f8f0cecfb2b
                    category:
                      id: 44e3d431-e058-412e-a8cc-7f8f0cecfb2b
                      type: saving
                      name: Emergency
                      iconKey: emergency
                      monthlyBudget: null
                      savingTarget: 5000000
                      createdAt: '2026-04-30T10:00:00Z'
                      updatedAt: '2026-04-30T10:00:00Z'
                    date: '2026-04-30'
                    note: April saving
                    createdAt: '2026-04-30T10:00:00Z'
                    updatedAt: '2026-04-30T10:00:00Z'
                message: Savings retrieved successfully
                meta:
                  page: 1
                  limit: 20
                  total: 1
                  totalPages: 1
        '401':
