services:
  api:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-finu}:${POSTGRES_PASSWORD:-finu}@postgres:5432/${POSTGRES_DB:-finu}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-this-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
      UPLOAD_DIR: /app/uploads
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - finu_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"const r=await fetch('http://localhost:3000/health'); process.exit(r.ok?0:1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finu}
      POSTGRES_DB: ${POSTGRES_DB:-finu}
    volumes:
      - finu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finu} -d ${POSTGRES_DB:-finu}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  finu_pgdata:
  finu_uploads:
